apiVersion: apps/v1
kind: Deployment
metadata:
  name: coder-agent
  namespace: ai-agents
  labels:
    app: coder-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: coder-agent
  template:
    metadata:
      labels:
        app: coder-agent
    spec:
      containers:
      - name: coder-agent
        image: coder-agent:latest
        ports:
        - containerPort: 8082
        workingDir: /workspace
        volumeMounts:
        - name: shared-workspace
          mountPath: /workspace
        env:
        - name: AGENT_TYPE
          value: "coder"
        - name: AGENT_PORT
          value: "8082"
        - name: ARCHITECT_AGENT_URL
          value: "http://architect-agent.ai-agents.svc.cluster.local:8081"
        - name: TESTER_AGENT_URL
          value: "http://tester-agent.ai-agents.svc.cluster.local:8083"
        - name: MYSQL_HOST
          value: "mysql.external-env.svc.cluster.local"
        - name: REDIS_HOST
          value: "redis.external-env.svc.cluster.local"
        - name: PHP_FPM_HOST
          value: "php-app.external-env.svc.cluster.local"
        - name: AMAZON_Q_START_URL
          valueFrom:
            configMapKeyRef:
              name: amazon-q-config
              key: start_url
        - name: AMAZON_Q_REGION
          valueFrom:
            configMapKeyRef:
              name: amazon-q-config
              key: region
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-secret
              key: access_key_id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-secret
              key: secret_access_key
        - name: AWS_DEFAULT_REGION
          valueFrom:
            configMapKeyRef:
              name: amazon-q-config
              key: region
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
      volumes:
      - name: shared-workspace
        persistentVolumeClaim:
          claimName: shared-workspace-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: coder-agent
  namespace: ai-agents
spec:
  selector:
    app: coder-agent
  ports:
  - port: 8082
    targetPort: 8082
  type: ClusterIP
