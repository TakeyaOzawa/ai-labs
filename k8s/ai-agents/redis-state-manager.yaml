apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-state-manager
  namespace: ai-agents
  labels:
    app: redis-state-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-state-manager
  template:
    metadata:
      labels:
        app: redis-state-manager
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        command:
        - redis-server
        - --appendonly
        - "yes"
        - --maxmemory
        - "256mb"
        - --maxmemory-policy
        - "allkeys-lru"
        volumeMounts:
        - name: redis-data
          mountPath: /data
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
      volumes:
      - name: redis-data
        persistentVolumeClaim:
          claimName: redis-state-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: redis-state-manager
  namespace: ai-agents
spec:
  selector:
    app: redis-state-manager
  ports:
  - port: 6379
    targetPort: 6379
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-state-pvc
  namespace: ai-agents
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
