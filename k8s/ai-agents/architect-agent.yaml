apiVersion: apps/v1
kind: Deployment
metadata:
  name: architect-agent
  namespace: ai-agents
  labels:
    app: architect-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: architect-agent
  template:
    metadata:
      labels:
        app: architect-agent
    spec:
      containers:
      - name: architect-agent
        image: architect-agent:latest
        ports:
        - containerPort: 8081
        workingDir: /workspace
        volumeMounts:
        - name: shared-workspace
          mountPath: /workspace
        env:
        - name: AGENT_TYPE
          value: "architect"
        - name: AGENT_PORT
          value: "8081"
        - name: PLANNER_AGENT_URL
          value: "http://planner-agent.ai-agents.svc.cluster.local:8080"
        - name: CODER_AGENT_URL
          value: "http://coder-agent.ai-agents.svc.cluster.local:8082"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: shared-workspace
        persistentVolumeClaim:
          claimName: shared-workspace-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: architect-agent
  namespace: ai-agents
spec:
  selector:
    app: architect-agent
  ports:
  - port: 8081
    targetPort: 8081
  type: ClusterIP
