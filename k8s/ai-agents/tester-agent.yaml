apiVersion: apps/v1
kind: Deployment
metadata:
  name: tester-agent
  namespace: ai-agents
  labels:
    app: tester-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tester-agent
  template:
    metadata:
      labels:
        app: tester-agent
    spec:
      containers:
      - name: tester-agent
        image: tester-agent:latest
        ports:
        - containerPort: 8083
        workingDir: /workspace
        volumeMounts:
        - name: shared-workspace
          mountPath: /workspace
        env:
        - name: AGENT_TYPE
          value: "tester"
        - name: AGENT_PORT
          value: "8083"
        - name: CODER_AGENT_URL
          value: "http://coder-agent.ai-agents.svc.cluster.local:8082"
        - name: PLANNER_AGENT_URL
          value: "http://planner-agent.ai-agents.svc.cluster.local:8080"
        - name: MYSQL_HOST
          value: "mysql.external-env.svc.cluster.local"
        - name: REDIS_HOST
          value: "redis.external-env.svc.cluster.local"
        - name: NGINX_HOST
          value: "nginx.external-env.svc.cluster.local"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
      volumes:
      - name: shared-workspace
        persistentVolumeClaim:
          claimName: shared-workspace-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: tester-agent
  namespace: ai-agents
spec:
  selector:
    app: tester-agent
  ports:
  - port: 8083
    targetPort: 8083
  type: ClusterIP
