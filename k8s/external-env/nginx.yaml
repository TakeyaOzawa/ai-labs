apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: external-env
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }
    
    http {
        upstream php {
            server php-app.external-env.svc.cluster.local:9000;
        }
        
        server {
            listen 80;
            root /var/www/html;
            index index.php index.html;
            
            location / {
                try_files $uri $uri/ /index.php?$query_string;
            }
            
            location ~ \.php$ {
                fastcgi_pass php;
                fastcgi_index index.php;
                fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
                include fastcgi_params;
            }
            
            location /api/execute {
                fastcgi_pass php;
                fastcgi_param SCRIPT_FILENAME $document_root/api/execute.php;
                include fastcgi_params;
            }
            
            location /health {
                return 200 "OK";
                add_header Content-Type text/plain;
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: external-env
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        - name: app-code
          mountPath: /var/www/html
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config
      - name: app-code
        persistentVolumeClaim:
          claimName: external-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: external-env
spec:
  selector:
    app: nginx
  ports:
  - port: 80
    targetPort: 80
